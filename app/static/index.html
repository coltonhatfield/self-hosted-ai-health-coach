<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Performance Command Center</title>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #c9d1d9; --accent: #58a6ff; --success: #2ea043; --warning: #d29922; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .header input { background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; }
        .dashboard { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        @media (min-width: 900px) { .dashboard { grid-template-columns: 1fr 1fr; } }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 20px; display: flex; flex-direction: column; }
        h2 { margin-top: 0; color: #fff; font-size: 1.2rem; display: flex; justify-content: space-between; align-items: center; }
        button { background: var(--accent); color: #fff; border: none; padding: 10px 15px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        button.secondary { background: var(--border); }
        .loading { color: var(--warning); font-style: italic; font-size: 0.9em; display: none; }
        
        /* Insights Styling */
        .insight-content { line-height: 1.6; font-size: 0.95rem; flex-grow: 1; overflow-y: auto; white-space: pre-wrap; padding-top: 10px; }
        
        /* Workout Styling */
        textarea { width: 100%; height: 400px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 15px; font-family: monospace; font-size: 0.9rem; resize: vertical; line-height: 1.5; box-sizing: border-box; margin-bottom: 15px; }
        .ai-controls { display: flex; gap: 10px; margin-top: 10px; }
        .ai-controls input { flex-grow: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size:1.5rem; color:#fff;">Performance Dashboard</h1>
        <input type="password" id="apiKey" placeholder="API Key">
    </div>

    <div class="dashboard">
        <div class="panel">
            <h2>
                Health & Recovery Insights 
                <button onclick="forceAnalyze()">Analyze Data</button>
            </h2>
            <span id="insightLoading" class="loading">Analyzing InfluxDB telemetry...</span>
            <div id="insightContent" class="insight-content">Waiting for analysis...</div>
        </div>

        <div class="panel">
            <h2>
                7-Day Libero Training Plan
                <button onclick="generateWorkout()" class="secondary">Draft New Week</button>
            </h2>
            <span id="workoutLoading" class="loading">Structuring microcycle...</span>
            
            <p style="font-size:0.85em; color:#8b949e; margin-top:0;">Manually edit the text below, or prompt the AI to modify it.</p>
            
            <textarea id="workoutPlan" placeholder="Your weekly plan will appear here. You can type directly in this box to make manual adjustments..."></textarea>
            
            <div class="ai-controls">
                <input type="text" id="aiPrompt" placeholder="e.g. 'Make Tuesday upper body only' or 'Add more plyos'">
                <button onclick="adjustWorkout()">AI Adjust</button>
                <button onclick="saveWorkout()" class="secondary" style="background: var(--success);">Save Edits</button>
            </div>
            <span id="saveStatus" style="font-size:0.85em; color:var(--success); margin-top:10px; display:none;">Plan saved!</span>
        </div>
    </div>

    <script>
        const apiKey = document.getElementById('apiKey');
        if(localStorage.getItem('health_api_key')) apiKey.value = localStorage.getItem('health_api_key');
        apiKey.addEventListener('change', () => localStorage.setItem('health_api_key', apiKey.value));

        // Format Markdown-ish text for the insights panel
        function formatText(text) {
            return text.replace(/\*\*(.*?)\*\*/g, '<strong style="color:#fff;">$1</strong>');
        }

        // Fast load: Grabs whatever is currently cached in the database on page refresh
        async function fetchCachedAdvice() {
            if(!apiKey.value) return;
            try {
                const res = await fetch('/api/v1/daily-advice', { headers: { 'X-API-Key': apiKey.value }});
                const data = await res.json();
                document.getElementById('insightContent').innerHTML = formatText(data.advice);
            } catch (e) {
                document.getElementById('insightContent').innerText = "Error analyzing data.";
            }
        }

        // On-Demand Load: Forces the AI to read InfluxDB and generate a brand new insight report
        async function forceAnalyze() {
            if(!apiKey.value) return alert("Enter API Key");
            document.getElementById('insightLoading').style.display = 'inline';
            try {
                const res = await fetch('/api/v1/force-advice', { method: 'POST', headers: { 'X-API-Key': apiKey.value }});
                const data = await res.json();
                document.getElementById('insightContent').innerHTML = formatText(data.advice);
            } catch (e) {
                document.getElementById('insightContent').innerText = "Error analyzing data. Check backend logs.";
            } finally {
                document.getElementById('insightLoading').style.display = 'none';
            }
        }

        // Grabs the currently saved text plan from the database
        async function fetchCurrentWorkout() {
            if(!apiKey.value) return;
            try {
                const res = await fetch('/api/v1/workout', { headers: { 'X-API-Key': apiKey.value }});
                const data = await res.json();
                if(data.workout_plan) document.getElementById('workoutPlan').value = data.workout_plan;
            } catch (e) {}
        }

        // Generates a new plan or modifies an existing one
        async function generateWorkout(modification = null) {
            if(!apiKey.value) return alert("Enter API Key");
            document.getElementById('workoutLoading').style.display = 'inline';
            
            const payload = { soreness: 5, energy: 5 }; // Defaults for the backend schema
            
            // If adjusting an existing plan, pass the current text and the prompt
            if (modification) {
                const currentPlan = document.getElementById('workoutPlan').value;
                payload.modification = `CURRENT PLAN:\n${currentPlan}\n\nUSER REQUEST: ${modification}`;
            }

            try {
                const res = await fetch('/api/v1/generate-workout', {
                    method: 'POST', headers: { 'X-API-Key': apiKey.value, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                document.getElementById('workoutPlan').value = data.workout_plan;
                document.getElementById('aiPrompt').value = ''; // Clear prompt box
            } catch (e) {
                alert("Error generating workout.");
            } finally {
                document.getElementById('workoutLoading').style.display = 'none';
            }
        }

        // Wrapper to pass the text input to the generator
        function adjustWorkout() {
            const prompt = document.getElementById('aiPrompt').value;
            if(!prompt) return alert("Enter an adjustment prompt first.");
            generateWorkout(prompt);
        }

        // Fast save route for manual text edits
        async function saveWorkout() {
            if(!apiKey.value) return;
            const currentText = document.getElementById('workoutPlan').value;
            try {
                await fetch('/api/v1/save-manual-workout', {
                    method: 'POST', headers: { 'X-API-Key': apiKey.value, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ plan: currentText })
                });
                const status = document.getElementById('saveStatus');
                status.style.display = 'block';
                setTimeout(() => status.style.display = 'none', 3000);
            } catch(e) { alert("Failed to save."); }
        }

        // Run initialization on load
        if(apiKey.value) {
            fetchCachedAdvice();
            fetchCurrentWorkout();
        }
    </script>
</body>
</html>
